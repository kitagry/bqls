name: Release

on:
  push:
    tags: ["*"]

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: bqls_linux_amd64
          - os: macos-latest
            asset_name: bqls_darwin_arm64
          - os: macos-13
            asset_name: bqls_darwin_amd64
    name: Release Go Binary
    runs-on: ${{ matrix.os }}
    env:
      BIN_NAME: bqls

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: setup Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: go.mod
        cache: true

    - name: download modules
      run: |
        go mod download

    - name: Set tag to environment variable
      id: set-tag
      run: echo ::set-output name=version::${GITHUB_REF#refs/*/}

    - name: build
      run: mkdir ./build && go build -o ./build/bqls -ldflags '-s -w -X main.version=${{ steps.set-tag.outputs.version }}' .

    - name: Zip binaries
      run: |
        cd build
        zip ${{ matrix.asset_name }}.zip bqls
        ls -lR ./
        cd ../

    - name: Upload binaries to release
      uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # latest
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./build/${{ matrix.asset_name }}.zip
        tag: ${{ github.ref }}
